<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamification Series — Domino's | Bonnie Xu</title>
  <link rel="icon" href="../favicon.svg" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="../shared-components.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,600;12..96,700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Poppins', sans-serif; background: #F4F2F1; color: #2B2B2B; overflow-x: hidden; }

    :root {
      --bg-page:   #F4F2F1;
      --bg-card:   #FBFAF9;
      --text-1:    #2B2B2B;
      --text-2:    #808080;
      --border:    #DDDBD9;
      --border-lt: #EDEDEB;
      --accent:    #E8452A;
      --shadow:    0px 0px 20px 0px rgba(0,0,0,0.03);
      --font-display: 'Bricolage Grotesque', sans-serif;
      --font-body:    'Poppins', sans-serif;
      --r-sm: 15px; --r-md: 24px; --r-lg: 32px;
    }

    .cs-inner { max-width: 1440px; margin: 0 auto; width: 100%; padding: 0 80px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { opacity: 0; transform: translateY(40px); transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1), transform 0.9s cubic-bezier(0.22, 1, 0.36, 1); }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
    .img-reveal { overflow: hidden; }
    .img-reveal img { transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.8s ease; transform: scale(1.08); opacity: 0; }
    .img-reveal.visible img { transform: scale(1); opacity: 1; }

    .nav-link { position: relative; }
    .nav-link::after { content:''; position:absolute; bottom:-3px; left:0; width:0; height:1px; background:#2B2B2B; transition: width 0.3s ease; }
    .nav-link:hover::after { width:100%; }

    .t-label   { font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--text-2); letter-spacing: 2px; text-transform: uppercase; }
    .t-display { font-family: var(--font-display); font-weight: 700; font-size: clamp(36px, 5vw, 64px); letter-spacing: -2.5px; line-height: 1.0; color: var(--text-1); }
    .t-h2      { font-family: var(--font-display); font-weight: 700; font-size: clamp(26px, 3vw, 36px); letter-spacing: -1.5px; line-height: 1.1; color: var(--text-1); }
    .t-h3      { font-family: var(--font-display); font-weight: 700; font-size: clamp(20px, 2vw, 28px); letter-spacing: -1px; line-height: 1.15; color: var(--text-1); }
    .t-h4      { font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: -0.5px; line-height: 1.2; color: var(--text-1); }
    .t-body-lg { font-family: var(--font-body); font-size: 16px; font-weight: 300; color: #555; line-height: 1.85; }
    .t-body    { font-family: var(--font-body); font-size: 14px; font-weight: 300; color: #555; line-height: 1.8; }

    .img-placeholder { width: 100%; background: #EBEBEA; border-radius: var(--r-sm); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 32px; border: 1.5px dashed #CCCCCC; }
    .img-placeholder .ph-name { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: #999; letter-spacing: 0.5px; }
    .img-placeholder .ph-hint { font-family: var(--font-body); font-size: 11px; font-weight: 300; color: #BBBBBB; text-align: center; }

    .wid-section { display: grid; grid-template-columns: 220px 1fr; gap: 64px; align-items: start; }
    .wid-num { font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 1px; margin-bottom: 8px; }

    .stat-chip { background: var(--bg-card); border: 1px solid var(--border-lt); border-radius: var(--r-sm); padding: 16px 20px; display: flex; flex-direction: column; gap: 4px; }
    .stat-num  { font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: -1px; color: var(--accent); }
    .stat-desc { font-family: var(--font-body); font-size: 11px; font-weight: 300; color: var(--text-2); }

    .result-chip { background: var(--text-1); border-radius: var(--r-sm); padding: 20px 24px; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; padding-bottom: 80px; }
    .contact-input::placeholder { color: rgba(255,255,255,0.35); }
    .contact-input:focus { outline: none; border-bottom-color: rgba(255,255,255,0.7) !important; }
    @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr !important; gap: 48px !important; } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-page); }
    ::-webkit-scrollbar-thumb { background: #AAAAAA; border-radius: 3px; }

    @media (max-width: 768px) {
      .cs-inner { padding: 0 20px; }
      .wid-section { grid-template-columns: 1fr; gap: 20px; }
      .two-col { grid-template-columns: 1fr; }
      .cs-meta { flex-direction: column !important; gap: 24px !important; }
      .cs-meta-grid { grid-template-columns: 1fr 1fr !important; }
      .features-grid { grid-template-columns: 1fr !important; }
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }
    /* Tablet: 2 columns */
    @media (min-width: 769px) and (max-width: 1023px) {
      .features-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    /* Desktop: 3 columns */
    @media (min-width: 1024px) {
      .features-grid {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { Navbar, Footer } = window;

const IMG = (name) => `../images/${name}`;

function Img({ filename, height = 320, hint = '' }) {
  const [ok, setOk] = useState(false);
  const [err, setErr] = useState(false);
  const src = IMG(filename);
  return err ? (
    <div className="img-placeholder" style={{ minHeight: height }}>
      <span style={{ fontSize: 22, opacity: 0.35 }}>🖼</span>
      <div className="ph-name">{filename}</div>
      {hint && <div className="ph-hint">{hint}</div>}
    </div>
  ) : (
    <div style={{ borderRadius: 15, overflow: 'hidden', background: '#EBEBEA', minHeight: ok ? 0 : height }}>
      {!ok && (
        <div className="img-placeholder" style={{ minHeight: height }}>
          <span style={{ fontSize: 22, opacity: 0.35 }}>🖼</span>
          <div className="ph-name">{filename}</div>
          {hint && <div className="ph-hint">{hint}</div>}
        </div>
      )}
      <img src={src} alt={filename} onLoad={() => setOk(true)} onError={() => setErr(true)}
        style={{ width: '100%', display: ok ? 'block' : 'none', objectFit: 'cover' }} />
    </div>
  );
}

function Label({ children }) {
  return <p className="t-label" style={{ marginBottom: 14 }}>{children}</p>;
}

function Divider() {
  return <hr style={{ border: 'none', borderTop: '1px solid var(--border)', margin: '0' }} />;
}


function CaseStudy() {
  return (
    <main style={{ paddingTop: 72 }}>
      <div className="cs-inner">

        {/* ── HEADER ── */}
        <section style={{ padding: '72px 0 56px' }}>
          <div className="fade-up">
            <Label>Case Study · Domino's</Label>
            <h1 className="t-display" style={{ marginBottom: 10 }}>Gamification Series</h1>
            <p style={{ fontFamily: 'var(--font-display)', fontWeight: 300, fontSize: 'clamp(18px, 2.5vw, 28px)', color: 'var(--text-2)', letterSpacing: '-0.5px', marginBottom: 40 }}>Designing scalable CRM game mechanics across 5 global markets</p>
          </div>

          <div className="fade-up cs-meta" style={{ display: 'flex', gap: 48, paddingTop: 32, borderTop: '1px solid var(--border)', flexWrap: 'wrap' }}>
            <div style={{ flex: 2, minWidth: 280 }}>
              <Label>Project Overview</Label>
              <p className="t-body-lg">Designed and scaled three gamification mechanics deployed across 5 global markets. Created reusable framework, implementation library, and documentation enabling regional teams to customize campaigns independently. Achieved 3× higher engagement through user-centered interaction design validated by multi-market testing.</p>
            </div>
            <div className="cs-meta-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '24px 32px', flex: 1, minWidth: 240 }}>
              <div><Label>Tools</Label><p className="t-body">Figma · Prototyping<br/>After Effects · Photoshop<br/>Illustrator</p></div>
              <div><Label>Role</Label><p className="t-body">UI/UX Designer</p></div>
              <div><Label>Markets</Label><p className="t-body">5 global markets</p></div>
              <div><Label>Result</Label><p className="t-body">3× higher click rates</p></div>
            </div>
          </div>
        </section>

        {/* ── HERO IMAGE ── */}
        <div className="fade-up" style={{ marginBottom: 80 }}>
          <Img filename="dominos-gamification.gif" height={480} hint="Hero — St Patrick's Day Mystery Deal animation" />
        </div>

        <Divider />

        {/* ── CHALLENGES ── */}
        <section style={{ padding: '80px 0' }}>
          <div className="fade-up" style={{ marginBottom: 32 }}>
            <Label>The Problem</Label>
            <h2 className="t-h2" style={{ marginBottom: 24 }}>Challenges</h2>
            <p className="t-body-lg" style={{ marginBottom: 16, maxWidth: 800 }}>Domino's traditionally offered deals directly, but the marketing team wanted to explore a new approach by making deal discovery more rewarding and exciting while increasing engagement and click rates.</p>
            <p className="t-body-lg" style={{ maxWidth: 800 }}>The challenge was designing interactions that felt fun without being overly complex, and repeatable so they could be deployed across different campaigns and regions.</p>
          </div>
        </section>

        <Divider />

        {/* ── WHAT I DID ── */}
        <section style={{ padding: '80px 0' }}>
          <div className="fade-up" style={{ marginBottom: 64 }}>
            <Label>Process</Label>
            <h2 className="t-h2">What I did</h2>
          </div>

          {/* 01 Mystery Deal */}
          <div className="fade-up" style={{ paddingTop: 56, paddingBottom: 64 }}>
            <div className="wid-section">
              <div>
                <div className="wid-num">01</div>
                <h3 className="t-h3">Mystery Deal</h3>
              </div>
              <div>
                <p className="t-body-lg" style={{ marginBottom: 18 }}>From concept to launch, I designed the Mystery Deal mechanic in Figma and created animations in After Effects to demonstrate interactions for stakeholders and developers.</p>
                <p className="t-body-lg" style={{ marginBottom: 18 }}>Users click to reveal a hidden offer, creating anticipation and surprise. The mechanic rewards curiosity while maintaining deal value transparency once revealed.</p>
                <p className="t-body-lg" style={{ marginBottom: 32 }}>The design focused on clear affordance while keeping the visual simple enough to work across campaigns. Each Mystery Deal could be customised with different copy, imagery, and offer types, enabling deployment across multiple markets. The Lunar New Year campaign achieved <strong>3× higher click rates</strong> compared to standard offers.</p>

                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, marginBottom: 40 }}>
                  <div className="stat-chip">
                    <span className="stat-num">3×</span>
                    <span className="stat-desc">Higher click rates · Lunar New Year campaign</span>
                  </div>
                  <div className="stat-chip">
                    <span className="stat-num">5</span>
                    <span className="stat-desc">Global markets deployed</span>
                  </div>
                </div>

                <video src="../images/dominos-mystery-deal.mp4" autoPlay loop muted playsInline style={{ width: '100%', borderRadius: 15, display: 'block' }} />
              </div>
            </div>
          </div>

          {/* 02 Flip Card */}
          <div className="fade-up" style={{ borderTop: '1px solid var(--border)', paddingTop: 56, paddingBottom: 64 }}>
            <div className="wid-section">
              <div>
                <div className="wid-num">02</div>
                <h3 className="t-h3">Flip Card</h3>
              </div>
              <div>
                <p className="t-body-lg" style={{ marginBottom: 18 }}>A card-flipping interaction where users tap to reveal details. The mechanic was designed for flexible deployment: as an app pop-up for markets without development resources, or as a landing page for markets with full implementation support.</p>
                <p className="t-body-lg" style={{ marginBottom: 40 }}>While functionally similar to Mystery Deal, Flip Card offered different visuals and interaction animations. The flip animation needed to feel responsive and natural across devices.</p>

                <div className="two-col" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                  <img src="../images/dominos-flip-card.avif" alt="Flip Card design" style={{ width: '100%', borderRadius: 15, display: 'block' }} />
                  <video src="../images/dominos-flip-card.mp4" autoPlay loop muted playsInline style={{ width: '100%', borderRadius: 15, display: 'block' }} />
                </div>
              </div>
            </div>
          </div>

          {/* 03 Calendar Reveal */}
          <div className="fade-up" style={{ borderTop: '1px solid var(--border)', paddingTop: 56, paddingBottom: 64 }}>
            <div className="wid-section">
              <div>
                <div className="wid-num">03</div>
                <h3 className="t-h3">Calendar Reveal</h3>
              </div>
              <div>
                <p className="t-body-lg" style={{ marginBottom: 18 }}>A daily unlock mechanic where users return to reveal new offers on specific dates. This creates anticipation and drives traffic around campaign windows.</p>
                <p className="t-body-lg" style={{ marginBottom: 18 }}>Designed specifically for Japan's Christmas campaign, this mechanic combined the excitement of advent calendar tradition with deal reveals, a new approach to increase retention while making deal discovery more rewarding.</p>
                <p className="t-body-lg" style={{ marginBottom: 40 }}>The design balances showing what's coming (to build anticipation) while keeping upcoming offers locked. Users can see their progress and know when to return for new deals.</p>

                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <img src="../images/dominos-advent-calendar.avif" alt="Advent Calendar — Japan Christmas Campaign" style={{ width: '100%', borderRadius: 15, display: 'block' }} />
                  <Img filename="dominos-calendar-reveal.gif" height={480} hint="Calendar Reveal — advent calendar interaction animation" />
                </div>
              </div>
            </div>
          </div>
        </section>

        <Divider />

        {/* ── FRAMEWORK ── */}
        <section style={{ padding: '80px 0' }}>
          <div className="fade-up" style={{ marginBottom: 48 }}>
            <Label>System Design</Label>
            <h2 className="t-h2">Framework &amp; Documentation Approach</h2>
          </div>

          <div className="fade-up features-grid" style={{ marginBottom: 48 }} >
            {[
              {
                title: 'Scalable Design Framework',
                subtitle: 'Core Interaction Pattern',
                items: ['Anticipation → Action → Reward structure', 'Adaptable to different visual themes', 'Consistent user experience across mechanics'],
              },
              {
                title: 'Customisation Guidelines',
                subtitle: 'What can & can\'t change',
                items: ['Which elements can change (copy, imagery, offers)', 'Which elements must stay consistent (interaction patterns, timing)', 'Brand compliance standards per market'],
              },
              {
                title: 'Implementation Library',
                subtitle: 'Confluence documentation',
                items: ['Design specifications with measurements', 'Animation timing and easing curves', 'Asset requirements and file formats', 'Technical implementation notes for developers'],
              },
            ].map((col, i) => (
              <div key={i} style={{ background: 'var(--bg-card)', borderRadius: 'var(--r-sm)', padding: '24px 28px', border: '1px solid var(--border-lt)' }}>
                <p className="t-label" style={{ marginBottom: 6 }}>{col.title}</p>
                <p style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 14, color: 'var(--text-1)', marginBottom: 16, letterSpacing: '-0.3px' }}>{col.subtitle}</p>
                <ul style={{ paddingLeft: 16 }}>
                  {col.items.map((item, j) => (
                    <li key={j} className="t-body" style={{ marginBottom: 8 }}>{item}</li>
                  ))}
                </ul>
              </div>
            ))}
          </div>

          <div className="fade-up" style={{ marginBottom: 48 }}>
            <h3 className="t-h4" style={{ marginBottom: 20 }}>Enablement Process</h3>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
              {[
                'Initial 30-minute walkthrough per market',
                'Shared Figma and Confluence file with all variations',
                'Technical Q&A with development teams',
                'Tracked post-launch data and iterated based on insights',
              ].map((item, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '16px 0', borderBottom: '1px solid var(--border-lt)' }}>
                  <span style={{ fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 600, color: 'var(--accent)', minWidth: 24 }}>0{i + 1}</span>
                  <p className="t-body" style={{ margin: 0 }}>{item}</p>
                </div>
              ))}
            </div>
          </div>

          <div className="fade-up" style={{ background: 'var(--bg-card)', borderRadius: 'var(--r-sm)', padding: '20px 24px', border: '1px solid var(--border-lt)' }}>
            <p className="t-label" style={{ marginBottom: 8 }}>Result</p>
            <p style={{ fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 300, color: '#555', lineHeight: 1.8 }}>5 markets independently deployed seasonal campaigns while fully adhering to design standards.</p>
          </div>
        </section>

        {/* ── NEXT PROJECT ── */}
        <div className="fade-up" style={{ borderTop: '1px solid var(--border)', paddingTop: 56, paddingBottom: 80, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 24 }}>
          <div>
            <p className="t-label" style={{ marginBottom: 8 }}>Next project</p>
            <p style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 22, letterSpacing: '-1px' }}>Brand &amp; Marketing Design</p>
          </div>
          <div style={{ display: 'flex', gap: 12 }}>
            <a href="dominos-brand-marketing-design.html" style={{ background: 'var(--text-1)', color: '#fff', textDecoration: 'none', padding: '14px 28px', borderRadius: 100, fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 500 }}>View next ↗︎︎</a>
            <a href="../portfolio.html#work" style={{ background: 'transparent', color: 'var(--text-1)', textDecoration: 'none', padding: '14px 28px', borderRadius: 100, fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 500, border: '1px solid var(--border)' }}>Back to all work</a>
          </div>
        </div>

      </div>
    </main>
  );
}

function App() {
  useEffect(() => {
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.06 }
    );
    document.querySelectorAll('.fade-up, .img-reveal, .line-reveal').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
  return (
    <div>
      <Navbar />
      <CaseStudy />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
