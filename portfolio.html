    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Poppins", sans-serif;
        background: #f4f2f1;
        color: #2b2b2b;
        overflow-x: hidden;
      }

      :root {
        --font-display: "Bricolage Grotesque", sans-serif;
        --font-body: "Poppins", sans-serif;
        --radius-md: 24px;
        --shadow-card: 0px 0px 20px 0px rgba(0, 0, 0, 0.06);
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(32px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes ticker {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }

      /* ── Premium animation system ── */
      .fade-up {
        opacity: 0;
        transform: translateY(40px);
        transition:
          opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .fade-up.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Staggered children */
      .stagger > .fade-up:nth-child(1) {
        transition-delay: 0s;
      }
      .stagger > .fade-up:nth-child(2) {
        transition-delay: 0.08s;
      }
      .stagger > .fade-up:nth-child(3) {
        transition-delay: 0.16s;
      }
      .stagger > .fade-up:nth-child(4) {
        transition-delay: 0.24s;
      }
      .stagger > .fade-up:nth-child(5) {
        transition-delay: 0.32s;
      }
      .stagger > .fade-up:nth-child(6) {
        transition-delay: 0.4s;
      }

      /* Smooth image reveal */
      .img-reveal {
        overflow: hidden;
      }
      .img-reveal img {
        transition:
          transform 1.2s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.8s ease;
        transform: scale(1.08);
        opacity: 0;
      }
      .img-reveal.visible img {
        transform: scale(1);
        opacity: 1;
      }

      /* Section divider line animation */
      .line-reveal {
        width: 0;
        height: 1px;
        background: #dddbd9;
        transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .line-reveal.visible {
        width: 100%;
      }

      .ticker-track {
        display: flex;
        animation: ticker 30s linear infinite;
        width: max-content;
      }
      .ticker-track:hover {
        animation-play-state: paused;
      }

      .nav-link {
        position: relative;
      }
      .nav-link::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 1px;
        background: #2b2b2b;
        transition: width 0.3s ease;
      }
      .nav-link:hover::after,
      .nav-link.active::after {
        width: 100%;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f4f2f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #aaaaaa;
        border-radius: 3px;
      }

      .mobile-menu {
        transform: translateX(100%);
        transition: transform 0.3s ease;
      }
      .mobile-menu.open {
        transform: translateX(0);
      }

      .btn-primary {
        transition:
          background 0.3s ease,
          transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 0.3s ease;
      }
      .btn-primary:hover {
        background: #1a1a1a !important;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(43, 43, 43, 0.15);
      }
      .btn-outline {
        transition:
          background 0.3s ease,
          color 0.3s ease,
          border-color 0.3s ease,
          transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .btn-outline:hover {
        background: #2b2b2b !important;
        color: #fff !important;
        transform: translateY(-2px);
      }

      .testimonial-card {

        border-color: #2b2b2b !important;
      }

      /* Work image card */

        overflow: hidden;
        cursor: pointer;
        aspect-ratio: 16/9;
        background: #1a1a1a;
        transition:

          box-shadow 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }

        transform: translateY(-5px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      }
      .work-img-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      }

        transform: scale(1.04);
      }

        background: linear-gradient(

        height: 34px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 13px;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(4px);
        transition:
          background 0.2s ease,
          border-color 0.2s ease;
      }
      .work-img-card:hover .arrow-btn {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.8);
      }

      /* Hero split */
      .hero-right {
        flex: 0 0 44%;
      }
      .hero-gradient {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 50%, rgba(244,242,241,0.55) 65%, #F4F2F1 100%);
        pointer-events: none;
      }
      @media (max-width: 768px) {
        .hero-right {
          display: none !important;
        }
        .hero-gradient {
          background: linear-gradient(to bottom, transparent 45%, rgba(244,242,241,0.7) 65%, #F4F2F1 85%) !important;

      /* Avatar */

        object-position: center top;
        flex-shrink: 0;
        border: 1.5px solid #f4f2f1;
      }

        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 80px;
        align-items: start;
      }
      .contact-input::placeholder {

      }

        .work-accordion {

        .work-accordion-left {

          border-right: none !important;
          border-bottom: 1px solid #ededeb !important;
        }
        .testimonials-grid {
          grid-template-columns: 1fr !important;

        .contact-grid {

        .contact-row {

        }
        .blog-grid {

        /* On mobile, cs-inner inside #contact already handles its own 20px padding */
        #contact .cs-inner {
          padding-top: 60px !important;
          padding-bottom: 60px !important;
        }
        .nav-inner {
          padding: 0 20px !important;
        }
        .project-card {
          flex-direction: column !important;
          min-height: unset !important;
        }
        .project-card-img {
          min-height: 220px !important;
          flex: unset !important;
        }
        .hamburger {
          display: block !important;
        }

      @media (max-width: 480px) {

          padding: 48px 16px;
        }

                  onMouseEnter={(e) => {
                    e.currentTarget.style.transform = "translateY(-5px)";
                    e.currentTarget.style.boxShadow =
                      "0 16px 40px rgba(0,0,0,0.08)";
                  }}
                  onMouseLeave={(e) => {
                    e.currentTarget.style.transform = "none";
                    e.currentTarget.style.boxShadow =
                      "0px 0px 20px 0px rgba(0,0,0,0.03)";
                  }}
                >
                  {/* Cover image */}
                  <div
                    style={{
                      aspectRatio: "16/9",
                      background: "#EBEBEA",
                      overflow: "hidden",
                    }}
                  >
                    <img
                      src={post.img}
                      alt={post.title}
                      style={{
                        width: "100%",
                        height: "100%",
                        objectFit: "cover",
                        display: "block",
                        transition: "transform 0.4s ease",
                      }}
                      onError={(e) => {
                        e.target.parentNode.style.background = "#EBEBEA";
                        e.target.style.display = "none";
                      }}
                    />
                  </div>
                  {/* Content */}
                  <div
                    style={{
                      padding: "20px 22px",
                      display: "flex",
                      flexDirection: "column",
                      gap: 10,
                      flex: 1,
                    }}
                  >
                    <span
                      style={{
                        display: "inline-block",
                        padding: "3px 10px",
                        borderRadius: 100,
                        border: "1px solid #AAAAAA",
                        fontSize: 10,
                        fontWeight: 500,
                        color: "#555",
                        fontFamily: "var(--font-body)",
                        letterSpacing: "0.3px",
                        alignSelf: "flex-start",
                      }}
                    >
                      {post.category}
                    </span>
                    <p
                      style={{
                        fontFamily: "var(--font-display)",
                        fontWeight: 700,
                        fontSize: 16,
                        letterSpacing: "-0.4px",
                        lineHeight: 1.3,
                        color: "#2B2B2B",
                        flex: 1,
                      }}

                      {post.title}
                    </p>
                    <p
                      style={{
                        fontFamily: "var(--font-body)",
                        fontSize: 12,
                        fontWeight: 300,
                        color: "#808080",
                        lineHeight: 1.7,
                      }}
                    >
                      {post.excerpt}
                    </p>
                    <div
                      style={{
                        borderTop: "1px solid #EDEDEB",
                        paddingTop: 12,
                        display: "flex",
                        justifyContent: "space-between",
                      }}
                    >
                      <span
                        style={{
                          fontFamily: "var(--font-body)",
                          fontSize: 11,
                          fontWeight: 300,
                          color: "#AAAAAA",
                        }}
                      >
                        {post.date}
                      </span>
                      <span
                        style={{
                          fontFamily: "var(--font-body)",
                          fontSize: 11,
                          fontWeight: 300,
                          color: "#AAAAAA",
                        }}
                      >
                        {post.read}
                      </span>
                    </div>
                  </div>
                </a>
              ))}
            </div>
          </section>
        );
      }

      // Footer → shared-components.js

      /* ─── APP ───────────────────────────────────────────── */
      function App() {
        useEffect(() => {
          // ProjectCard elements manage their own staggered observers
          const obs = new IntersectionObserver(
            (entries) =>
              entries.forEach((e) => {
                if (e.isIntersecting) {
                  e.target.classList.add("visible");
                  obs.unobserve(e.target);
                }
              }),
            { threshold: 0.06, rootMargin: "0px 0px -60px 0px" },
          );
          document
            .querySelectorAll(
              ".fade-up:not(.project-card), .img-reveal, .line-reveal",
            )
            .forEach((el) => obs.observe(el));
          return () => obs.disconnect();
        }, []);
        return (
          <div>
            <Navbar />
            <Hero />
            <main className="page-wrap">
              <Work />
              <Services />
              <Testimonials />
              <BlogPreviews />
            </main>
            <NewsletterBanner />
            <Contact />
            <Footer />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
